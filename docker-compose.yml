services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: watchio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - watchio-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d watchio"]
      interval: 5s
      timeout: 3s
      retries: 10

  watchio-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "4000"
      TRUST_PROXY: "1"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/watchio?schema=public
      CLIENT_ORIGIN: http://localhost:5173,http://localhost:8080

volumes:
  watchio-postgres:
